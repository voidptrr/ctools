name: checks

on:
  workflow_call:
    inputs:
      nix-command:
        description: Command to run for project checks.
        required: false
        default: nix flake check
        type: string
  workflow_dispatch:
    inputs:
      nix-command:
        description: Command to run for project checks.
        required: false
        default: nix flake check
        type: string

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - run: ${{ inputs.nix-command }}
